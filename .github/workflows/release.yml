name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run build
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css
      - name: Create or update release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
