name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$VERSION" node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.RELEASE_VERSION;
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Tag must be a semver version, optionally prefixed with v. Got: ${version}`);
          }
          const readJson = (path) => JSON.parse(fs.readFileSync(path, "utf8"));
          const manifest = readJson("manifest.json");
          const packageJson = readJson("package.json");
          const packageLock = readJson("package-lock.json");
          const versions = readJson("versions.json");
          const actual = [manifest.version, packageJson.version, packageLock.version, packageLock.packages?.[""]?.version];
          if (actual.some((value) => value !== version) || versions[version] !== manifest.minAppVersion) {
            throw new Error(`Version files must already contain ${version} before tagging.`);
          }
          NODE
      - run: npm test
      - run: npm run check
      - run: npm run build
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css
      - name: Create or update release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
