name: Generate TypeScript 7 compatibility artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  generate:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      contains(github.event.pull_request.title, 'typescript from 6.0.3 to 7.0.2')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Generate official side-by-side compiler layout
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.devDependencies['@typescript/native'] = 'npm:typescript@^7.0.2';
          pkg.devDependencies.typescript = 'npm:@typescript/typescript6@^6.0.2';
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          bun install --ignore-scripts
          bun install --frozen-lockfile --ignore-scripts
      - name: Upload reviewed manifest and lockfile
        uses: actions/upload-artifact@v4
        with:
          name: typescript7-compat-${{ github.event.pull_request.number }}
          path: |
            package.json
            bun.lock
          if-no-files-found: error
          retention-days: 1
